<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal | Courses</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="site-name">Student Portal</div>
    <nav>
      <ul>
        <li><a href="#hero">Home</a></li>
        <li><a href="#courses">Courses</a></li>
        <li><a href="#profile">Profile</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="hero">
      <h1>Welcome to the Student Portal</h1>
      <p>Search, sort, and explore your enrolled courses.</p>
    </section>

    <section id="courses">
      <h2>Your Courses</h2>

      <div class="controls">
        <input type="text" id="search-courses" placeholder="Search courses...">
        <button type="button" id="sort-credits-btn">Sort by Credits</button>
      </div>

      <div class="course-grid"></div>

      <p id="total-credits"></p>
      <div id="selected-course"></div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Student Portal. All rights reserved.</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
