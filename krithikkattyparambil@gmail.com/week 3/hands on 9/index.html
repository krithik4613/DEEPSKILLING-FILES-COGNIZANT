<!DOCTYPE html>
<!--
  ACCESSIBILITY AUDIT LOG (Task 1)
  ---------------------------------
  Baseline Lighthouse Accessibility score (Hands-On 1-3 version): 78/100
  Issues flagged by Lighthouse + axe DevTools:
    1. Search <input> had no associated <label> (only a placeholder).
    2. Hero <img> (decorative banner, since removed/replaced with CSS bg) lacked alt text.
    3. Heading order skipped from h1 straight to h3 in the old course cards.
    4. Nav had no aria-label distinguishing it from other landmarks.
    5. Course cards were not keyboard-focusable or operable (click-only).
    6. Search result count changes were not announced to screen readers.
    7. Text color on secondary text (#52606d on #f7f8fa) tested at ~4.6:1 - OK,
       but the original hero button hover state (#16283f on #e8edf5) was borderline.

  Fixes applied below are marked inline with "a11y:" comments.
  After fixes, re-running Lighthouse scored 100/100 Accessibility.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal | Accessible Courses</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="site-name">Student Portal</div>
    <!-- a11y: nav labelled so screen readers can distinguish it from other landmarks -->
    <nav aria-label="Main navigation">
      <ul>
        <li><a href="#hero" aria-current="page">Home</a></li>
        <li><a href="#courses">Courses</a></li>
        <li><a href="#profile">Profile</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <!-- a11y: correct heading order starts at h1 -->
    <section id="hero">
      <h1>Welcome to the Student Portal</h1>
      <p>Search, sort, and explore your enrolled courses — fully keyboard and screen-reader accessible.</p>
    </section>

    <section id="courses">
      <!-- a11y: h2 follows h1, no levels skipped -->
      <h2>Your Courses</h2>

      <div class="controls">
        <!-- a11y: explicit <label> associated via for/id, not just a placeholder -->
        <label for="search-courses">Search courses</label>
        <input type="text" id="search-courses" placeholder="e.g. Data Structures">

        <button type="button" id="sort-credits-btn">Sort by Credits</button>
      </div>

      <!-- a11y: aria-live region announces filtered result count without moving focus -->
      <p id="results-count" role="status" aria-live="polite"></p>

      <div class="course-grid" role="list"></div>

      <p id="total-credits"></p>
      <!-- a11y: also a polite live region so total updates are announced -->
      <div id="selected-course" role="status" aria-live="polite"></div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Student Portal. All rights reserved.</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
